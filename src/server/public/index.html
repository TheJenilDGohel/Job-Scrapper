<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered autonomous job discovery engine. Smart matching, deep intelligence scraping, and real-time career alerts.">
    <meta name="theme-color" content="#020617">
    <title>Job Discovery — Autonomous Intelligence for your Career</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <h1>Job Discovery</h1>
                </div>
                <span class="prod-badge">v1.1 Active</span>
            </div>

            <div class="sidebar-section">
                <label>Intelligence Control</label>
                <button id="sync-btn" class="btn btn-sidebar btn-block" style="background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.3); color: var(--accent); margin-bottom: 0.5rem; justify-content: center;">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path></svg>
                    Sync Jobs Now
                </button>
                <div class="sync-status">
                    <span class="dot" id="sync-dot"></span>
                    <span id="last-updated">Ready to discover</span>
                </div>
            </div>

            <div class="sidebar-section">
                <label>Search Discovery</label>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Role, skill, company...">
                </div>
            </div>

            <div class="sidebar-section">
                <label>Smart Filters</label>
                <div class="filter-group">
                    <button class="btn btn-sidebar active" data-filter="all">All Postings</button>
                    <button class="btn btn-sidebar" data-filter="mobile">Mobile & Flutter</button>
                    <button class="btn btn-sidebar" data-filter="high-score">Top Matches</button>
                    <button class="btn btn-sidebar" data-filter="recent">Recent Only</button>
                </div>
            </div>

            <div class="sidebar-section">
                <label>Sorting</label>
                <select id="sort-select" class="sort-select">
                    <option value="score-desc">Highest Match</option>
                    <option value="score-asc">Lowest Match</option>
                    <option value="date-desc">Newest First</option>
                </select>
            </div>

            <div class="sidebar-footer">
                <div class="stats-mini">
                    <div class="stat-mini">
                        <span class="label">Total</span>
                        <span class="value" id="total-jobs">0</span>
                    </div>
                    <div class="stat-mini">
                        <span class="label">Avg</span>
                        <span class="value accent" id="avg-score">—</span>
                    </div>
                    <div class="stat-mini">
                        <span class="label">Top</span>
                        <span class="value success" id="high-matches">0</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h2 id="view-title">All Discoveries</h2>
                <div class="header-meta">
                    <p class="tagline">Autonomous Intelligence for your Career</p>
                    <div id="results-count-container"></div>
                </div>
            </header>

            <section class="job-grid" id="job-grid">
                <!-- Job cards will be injected here via JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Analyzing job data...</p>
                </div>
            </section>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                Job Discovery Engine
            </span>
            <span class="footer-status" id="last-updated">Autonomous Intelligence Active</span>
        </div>
    </footer>

    <!-- Modal for Job Details -->
    <div id="job-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="close-modal-btn" aria-label="Close modal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div id="modal-body">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
