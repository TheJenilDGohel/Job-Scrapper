<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #020617;
      color: #f8fafc;
    }
    h2 { font-size: 1.1rem; margin-top: 0; color: #6366f1; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; }
    input, textarea {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #1e293b;
      background: #0f172a;
      color: #fff;
      font-size: 0.85rem;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 5px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 0.8rem; text-align: center; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <h2>🔍 Save to Discovery</h2>
  <div class="form-group">
    <label>Job Title</label>
    <input type="text" id="title" placeholder="e.g. Flutter Developer">
  </div>
  <div class="form-group">
    <label>Company</label>
    <input type="text" id="company" placeholder="e.g. Google">
  </div>
  <div class="form-group">
    <label>URL</label>
    <input type="text" id="url" readonly>
  </div>
  <div class="form-group">
    <label>Location</label>
    <input type="text" id="location" placeholder="e.g. Remote">
  </div>
  <button id="save-btn">Save to Dashboard</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
